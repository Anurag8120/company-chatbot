<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kvon Chatbot</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #e8f0fe, #f5f5f5);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .chat-container {
      width: 420px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .chat-header {
      background: #007bff;
      color: white;
      padding: 16px 20px;
      font-size: 18px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .chat-header span.dot {
      width: 10px;
      height: 10px;
      background: #7effa0;
      border-radius: 50%;
      display: inline-block;
    }

    .chat-box {
      height: 420px;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #f9f9f9;
    }

    .message {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
      word-wrap: break-word;
    }

    .message.user {
      background: #007bff;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .message.bot {
      background: #e9ecef;
      color: #333;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .message.typing {
      background: #e9ecef;
      align-self: flex-start;
      color: #888;
      font-style: italic;
    }

    .input-box {
      display: flex;
      padding: 12px;
      border-top: 1px solid #ddd;
      gap: 8px;
      background: white;
    }

    input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #ccc;
      border-radius: 24px;
      font-size: 14px;
      outline: none;
      transition: border 0.2s;
    }

    input:focus {
      border-color: #007bff;
    }

    button {
      padding: 10px 18px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 24px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      transition: background 0.2s;
    }

    button:hover {
      background: #0056d6;
    }

    button:disabled {
      background: #a0c4ff;
      cursor: not-allowed;
    }
  </style>
</head>

<body>

  <div class="chat-container">
    <div class="chat-header">
      <span class="dot"></span> Kvon Chatbot
    </div>

    <div class="chat-box" id="chatBox">
      <div class="message bot">👋 Hello! I'm Kvon's assistant. Ask me anything about our company!</div>
    </div>

    <div class="input-box">
      <input type="text" id="userInput" placeholder="Ask a question..."
        onkeydown="if(event.key==='Enter') sendMessage()" />
      <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    function sendMessage() {
      const input = document.getElementById("userInput");
      const chatBox = document.getElementById("chatBox");
      const sendBtn = document.getElementById("sendBtn");
      const text = input.value.trim();
      if (!text) return;

      // Show user message
      chatBox.innerHTML += `<div class="message user">${escapeHtml(text)}</div>`;
      input.value = "";
      sendBtn.disabled = true;

      // Show typing indicator
      const typingId = "typing-" + Date.now();
      chatBox.innerHTML += `<div class="message typing" id="${typingId}">Bot is typing...</div>`;
      chatBox.scrollTop = chatBox.scrollHeight;

      fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text })
      })
        .then(res => res.json())
        .then(data => {
          document.getElementById(typingId)?.remove();
          chatBox.innerHTML += `<div class="message bot">${escapeHtml(data.response)}</div>`;
          chatBox.scrollTop = chatBox.scrollHeight;
        })
        .catch(() => {
          document.getElementById(typingId)?.remove();
          chatBox.innerHTML += `<div class="message bot">⚠️ Error connecting to server. Is Flask running?</div>`;
          chatBox.scrollTop = chatBox.scrollHeight;
        })
        .finally(() => {
          sendBtn.disabled = false;
          input.focus();
        });
    }

    function escapeHtml(text) {
      const d = document.createElement("div");
      d.appendChild(document.createTextNode(text));
      return d.innerHTML;
    }
  </script>

</body>

</html>
